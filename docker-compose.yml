version: '3.8'

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    ports:
      - "6379:6379"
    environment:
      # Optional: Configure FalkorDB-specific settings
      # FALKORDB_PASSWORD: your_password
      FALKORDB_PORT: "6379"
    volumes:
      # Optional: Persist data
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  falkordb_data:
    driver: local
